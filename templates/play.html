<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@{{ author }} — X Videos</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body class="play">

<header>
  <a class="back-btn" href="{{ back }}">← 返回</a>
  <a class="author-link" href="/author/{{ author }}">@<span>{{ author }}</span></a>
  <div class="star-rating" id="star-rating" data-author="{{ author }}" data-filename="{{ filename }}">
    {% for i in range(1, 6) %}
    <span class="star {% if i <= current_score %}active{% endif %}" data-score="{{ i }}">★</span>
    {% endfor %}
  </div>
  <button class="delete-btn" id="delete-btn" data-author="{{ author }}" data-filename="{{ filename }}">删除视频</button>
  <a class="logout" href="/logout">退出登录</a>
</header>

<div class="player-wrap">
  <video src="{{ src }}" controls autoplay playsinline poster="{{ thumb }}">
    您的浏览器不支持 video 标签。
  </video>
</div>

<script>
// ── 星级评分 ──────────────────────────────────────────────────
(function () {
  const container = document.getElementById('star-rating');
  const stars = container.querySelectorAll('.star');
  const author = container.dataset.author;
  const filename = container.dataset.filename;

  function setStars(score) {
    stars.forEach(s => {
      s.classList.toggle('active', parseInt(s.dataset.score) <= score);
    });
  }

  // 悬停预览
  stars.forEach(s => {
    s.addEventListener('mouseenter', () => setStars(parseInt(s.dataset.score)));
    s.addEventListener('mouseleave', () => {
      const cur = parseInt(container.dataset.current || '0');
      setStars(cur);
    });
    s.addEventListener('click', async () => {
      const score = parseInt(s.dataset.score);
      // 再次点击同一颗星则取消评分
      const prev = parseInt(container.dataset.current || '0');
      const newScore = (score === prev) ? 0 : score;
      try {
        const res = await fetch(`/rate/${author}/${filename}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ score: newScore }),
        });
        if (!res.ok) throw new Error();
        container.dataset.current = newScore;
        setStars(newScore);
      } catch (_) {
        // 静默失败，恢复原状
        setStars(prev);
      }
    });
  });

  // 初始化 current
  container.dataset.current = '{{ current_score }}';
})();

// ── 删除视频 ──────────────────────────────────────────────────
document.getElementById('delete-btn').addEventListener('click', async () => {
  if (!confirm('确定要删除这个视频吗？此操作不可恢复。')) return;

  const btn = document.getElementById('delete-btn');
  const author   = btn.dataset.author;
  const filename = btn.dataset.filename;

  btn.disabled = true;
  btn.textContent = '删除中…';

  try {
    const res = await fetch(`/delete/${author}/${filename}`, { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    window.location.href = '{{ back }}';
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '删除失败，重试';
  }
});
</script>

</body>
</html>
