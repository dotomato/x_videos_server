<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>喜欢 — X Videos</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>

<header>
  <h1><span>X</span> Videos</h1>
  <nav class="header-nav">
    <a class="back-btn" href="/">首页</a>
    <a class="back-btn" href="/bookmarks">书签</a>
    <a class="back-btn" href="/timeline">时间线</a>
    <a class="back-btn" href="/downloader">下载器</a>
    <a class="logout" href="/logout">退出登录</a>
  </nav>
</header>

<main>
  <section>
    <h2>喜欢的视频</h2>
    {% if videos %}
    <div class="grid">
      {% for v in videos %}
      <div class="card">
        <div class="thumb">
          <a href="/play/{{ v.author }}/{{ v.mp4 }}" target="_blank">
            {% if v.jpg %}
            <img src="/videos/{{ v.author }}/{{ v.jpg }}" loading="lazy" alt="{{ v.author }}">
            {% else %}
            <div class="no-thumb">🎬</div>
            {% endif %}
            <div class="play-btn">▶</div>
          </a>
        </div>
        <div class="card-info">
          <a href="/author/{{ v.author }}" target="_blank">@{{ v.author }}</a>
          <div class="card-meta">
            <span class="card-stars">
              {% for i in range(1, 6) %}
              <span class="{% if i <= v.score %}s-on{% else %}s-off{% endif %}">★</span>
              {% endfor %}
            </span>
            <span>{{ v.mtime | int | datetimeformat }}</span>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <p class="empty">还没有评过分的视频，去播放页给视频打星吧。</p>
    {% endif %}
  </section>
</main>

</body>
</html>
