{% extends "base_timeline.html" %}

{% block title %}书签{% endblock %}

{% block header %}
<header>
  <a class="back-btn" href="/">← 返回首页</a>
  <h1><span>X</span> 书签</h1>
  <span class="count" id="tweet-count">共 {{ tweets|length }} 条（{{ tweets|selectattr('videos')|list|length }} 条含视频）</span>
  <a class="back-btn" href="/bookmarks" id="refresh-btn">刷新</a>
  <a class="logout" href="/logout">退出登录</a>
</header>
{% endblock %}

{% block more_url_script %}const MORE_URL = '/bookmarks/more';{% endblock %}
